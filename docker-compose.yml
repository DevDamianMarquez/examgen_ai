version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: examgen_db
    environment:
      POSTGRES_USER: examgen
      POSTGRES_PASSWORD: examgen_pass
      POSTGRES_DB: examgen_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U examgen -d examgen_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: examgen_backend
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql://examgen:examgen_pass@db:5432/examgen_db
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    image: node:20-alpine
    container_name: examgen_frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host"
    environment:
      - VITE_API_URL=http://localhost:8000

volumes:
  postgres_data:
